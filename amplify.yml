# AWS Amplify Hosting — Next.js (WEB_COMPUTE). Set NEXT_PUBLIC_API_URL in the Amplify console to your HTTPS API URL.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
